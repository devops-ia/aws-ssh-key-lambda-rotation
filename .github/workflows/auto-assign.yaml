name: Auto-assign issue
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, ready_for_review]
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 'auto-assign issue'
        uses: pozil/auto-assign-issue@70adb98ca8b3941524e9ecde48e89067c4f96736 # v3.0.0
        with:
          repo-token: ${{ secrets.PAT_GITHUB }}
          teams: devops-ia
