name: Auto-assign issue
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, ready_for_review]
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: 'auto-assign issue'
        uses: pozil/auto-assign-issue@af6beea6bdf1e8eb373f061c5bc168681fc6d011 # v4.0.1
        with:
          repo-token: ${{ secrets.PAT_GITHUB }}
          teams: devops-ia
